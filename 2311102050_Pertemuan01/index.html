<!doctype html>
<html lang="id" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ramadan</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="vh-100 d-flex flex-column justify-content-center align-items-center bg-black overflow-hidden"
  >
    <img
      src="/2311102050_Pertemuan01/bg.png"
      class="position-absolute w-100 h-100 object-fit-cover opacity-25 z-n1"
    />

    <i
      class="bi bi-stars position-absolute top-0 start-0 p-4 text-warning opacity-50 display-6"
    ></i>
    <i
      class="bi bi-moon-stars position-absolute bottom-0 end-0 p-4 text-warning opacity-50 display-6"
    ></i>

    <div
      class="col-11 col-md-8 col-lg-6 text-center p-4 bg-dark bg-opacity-50 border border-warning rounded-5 shadow-lg mt-auto"
    >
      <i
        class="bi bi-lantern text-warning display-1 opacity-75 mb-3 d-block"
      ></i>

      <h1 class="display-4 fw-bolder text-uppercase">
        Ramadan <span class="text-warning">Kareem</span>
      </h1>

      <p class="lead opacity-75 mb-4">
        Bulan suci penuh ampunan telah tiba. Mari sucikan hati dan bersihkan
        jiwa.
      </p>

      <button
        class="btn btn-warning rounded-pill px-5 py-3 fw-bold text-uppercase shadow"
        data-bs-toggle="modal"
        data-bs-target="#m"
      >
        <i class="bi bi-envelope-paper-fill me-2"></i>Buka Kejutan
      </button>
    </div>

    <p class="mt-auto py-3 text-white opacity-25 small text-uppercase">
      made with ❤️ by galih trisna
    </p>

    <div class="modal fade" id="m">
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content bg-dark border-warning rounded-5 text-center p-5"
        >
          <i
            class="bi bi-gift-fill text-warning display-1 opacity-75 mb-3 d-block"
          ></i>

          <h2 class="fw-bolder text-warning text-uppercase">Selamat!</h2>

          <h5 class="fw-light mb-4">
            Anda dapat <strong class="text-warning">Tiket Surga VVIP</strong>!
          </h5>

          <button
            class="btn btn-outline-warning rounded-pill w-100 text-uppercase"
            data-bs-dismiss="modal"
          >
            Alhamdulillah
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
