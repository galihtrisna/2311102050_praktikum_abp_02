<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praktikum ABP Minggu 4</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="border mt-4 p-4 bg-white shadow-sm"
      style="max-width: 400px; margin: 0 auto"
    >
      <h5 class="mb-3">Profil Pengguna</h5>
      <button id="btn-tampil" class="btn btn-dark w-100">Tampilkan Data</button>
      <div
        id="hasil-profil"
        class="border bg-light p-3 mt-3"
        style="display: none; font-size: 14px"
      ></div>
      <div class="mt-4 text-center text-muted" style="font-size: 12px">
        Galih Trisna | 2311102050
      </div>
    </div>
    <script>
      var tombol = document.getElementById("btn-tampil");
      var hasil = document.getElementById("hasil-profil");

      tombol.onclick = function () {
        fetch("data.php")
          .then(function (response) {
            return response.json();
          })
          .then(function (data) {
            hasil.style.display = "block";
            hasil.innerHTML =
              "Nama: <b>" +
              data.nama +
              "</b><br>" +
              "Pekerjaan: <b>" +
              data.pekerjaan +
              "</b><br>" +
              "Lokasi: <b>" +
              data.lokasi +
              "</b>";
          });
      };
    </script>
  </body>
</html>
