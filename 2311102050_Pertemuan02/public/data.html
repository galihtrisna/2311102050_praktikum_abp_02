<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Inventaris</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.datatables.net/2.3.7/css/dataTables.bootstrap5.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">InventarisKantor</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/index.html">Beranda</a>
          <a class="nav-link" href="/form.html">Tambah</a>
          <a class="nav-link active" href="/data.html">Data</a>
        </div>
      </div>
    </nav>

    <div class="container py-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Data Inventaris</h4>
        <a href="/form.html" class="btn btn-dark btn-sm">+ Tambah</a>
      </div>

      <div class="card border-0 shadow rounded-4">
        <div class="card-body p-4">
          <table
            id="tabelInventaris"
            class="table table-hover align-middle mb-0"
            style="width: 100%"
          >
            <thead class="table-light">
              <tr>
                <th>Kode</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Jumlah</th>
                <th class="text-center">Aksi</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modalEdit" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-semibold">Edit Barang</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body pt-0">
            <input type="hidden" id="edit-id" />

            <div class="mb-3">
              <label class="form-label">Kode</label>
              <input type="text" class="form-control" id="edit-kode" />
            </div>

            <div class="mb-3">
              <label class="form-label">Nama</label>
              <input type="text" class="form-control" id="edit-nama" />
            </div>

            <div class="mb-3">
              <label class="form-label">Kategori</label>
              <select class="form-select" id="edit-kategori">
                <option>Furniture</option>
                <option>Elektronik</option>
                <option>Penyimpanan</option>
                <option>Lainnya</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Jumlah</label>
              <input type="number" class="form-control" id="edit-jumlah" />
            </div>
          </div>

          <div class="modal-footer border-0">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
              Batal
            </button>
            <button class="btn btn-dark" id="btnUpdate">Simpan</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.bootstrap5.min.js"></script>

    <script>
      $(document).ready(function () {
        const table = $("#tabelInventaris").DataTable({
          ajax: "/api/inventaris",
          columns: [
            { data: "kode" },
            { data: "nama" },
            { data: "kategori" },
            { data: "jumlah" },
            {
              data: "id",
              className: "text-center",
              render: function (data, type, row) {
                return `
                                <div class="d-flex justify-content-center gap-2">
                                    <button class="btn btn-sm btn-outline-dark btn-edit"
                                        data-id="${data}"
                                        data-kode="${row.kode}"
                                        data-nama="${row.nama}"
                                        data-kategori="${row.kategori}"
                                        data-jumlah="${row.jumlah}">
                                        Edit
                                    </button>

                                    <a href="/hapus/${data}" 
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Yakin hapus data ini?')">
                                        Hapus
                                    </a>
                                </div>
                            `;
              },
            },
          ],
        });

        $("#tabelInventaris").on("click", ".btn-edit", function () {
          $("#edit-id").val($(this).data("id"));
          $("#edit-kode").val($(this).data("kode"));
          $("#edit-nama").val($(this).data("nama"));
          $("#edit-kategori").val($(this).data("kategori"));
          $("#edit-jumlah").val($(this).data("jumlah"));
          $("#modalEdit").modal("show");
        });

        $("#btnUpdate").click(function () {
          const id = $("#edit-id").val();

          const updateData = {
            kode: $("#edit-kode").val(),
            nama: $("#edit-nama").val(),
            kategori: $("#edit-kategori").val(),
            jumlah: $("#edit-jumlah").val(),
          };

          $.ajax({
            url: "/api/inventaris/" + id,
            type: "PUT",
            contentType: "application/json",
            data: JSON.stringify(updateData),
            success: function () {
              $("#modalEdit").modal("hide");
              table.ajax.reload();
            },
          });
        });
      });
    </script>
  </body>
</html>
