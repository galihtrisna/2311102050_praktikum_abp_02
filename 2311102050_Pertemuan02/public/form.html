<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Barang - Inventaris</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">InventarisKantor</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/index.html">Beranda</a>
          <a class="nav-link active" href="/form.html">Tambah</a>
          <a class="nav-link" href="/data.html">Data</a>
        </div>
      </div>
    </nav>

    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 90vh"
    >
      <div class="col-md-6">
        <div class="card border-0 shadow rounded-4">
          <div class="card-body p-5">
            <h4 class="fw-bold mb-4 text-center">Tambah Barang</h4>

            <form action="/tambah" method="POST">
              <div class="mb-3">
                <label class="form-label">Kode Barang</label>
                <input
                  type="text"
                  class="form-control"
                  name="kode"
                  placeholder="INV-003"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Nama Barang</label>
                <input
                  type="text"
                  class="form-control"
                  name="nama"
                  placeholder="Kursi Direktur"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Kategori</label>
                <select class="form-select" name="kategori" required>
                  <option value="">Pilih kategori...</option>
                  <option>Furniture</option>
                  <option>Elektronik</option>
                  <option>Penyimpanan</option>
                  <option>Lainnya</option>
                </select>
              </div>

              <div class="mb-4">
                <label class="form-label">Jumlah</label>
                <input
                  type="number"
                  class="form-control"
                  name="jumlah"
                  min="1"
                  required
                />
              </div>

              <button type="submit" class="btn btn-dark w-100 py-2">
                Simpan Barang
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
